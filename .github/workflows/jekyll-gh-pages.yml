name: Deploy Jekyll → GitHub Pages | Legal Algeria Hub

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Jekyll
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auto-create _config.yml if missing
        run: |
          [ -f "_config.yml" ] || cat > _config.yml << 'EOF'
          title: "Legal Algeria Hub — بوابة الميزان الذكي"
          description: "منصة قانونية جزائرية | Law 18-07 | SIREP OASIS NEXUS"
          lang: ar
          direction: rtl
          baseurl: ""
          exclude: ["node_modules", "*.sh", ".github"]
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    name: Deploy to Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
